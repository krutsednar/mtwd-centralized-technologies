worker_processes  auto;

error_log  logs/error.log;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # TLS session cache shared across workers
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    server {
        listen       192.168.0.58:1978 ssl;
        server_name  192.168.0.58;

        ssl_certificate      "D:/System Development/Production Environment/mtwd-centralized-technologies/ssl/cert.pem";
        ssl_certificate_key  "D:/System Development/Production Environment/mtwd-centralized-technologies/ssl/key.pem";

        # Max upload size (covers Livewire temporary file uploads)
        client_max_body_size  25M;

        # Increase timeouts for long-running artisan requests
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;

        location / {
            proxy_pass         http://127.0.0.1:8001;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host:1978;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Port  1978;

            # WebSocket support (Livewire, Echo)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
